name: job-watch

on:
  schedule:
    # Runs at 6:00 and 18:00 UTC every day (~9am / 9pm Palestine time).
    # Change the cron expression to adjust frequency. crontab.guru helps.
    - cron: "0 6,18 * * *"
  workflow_dispatch: {}   # lets you click "Run workflow" manually on GitHub to test

permissions:
  contents: write   # needed so the workflow can commit the updated state file

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run job-watch
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python watch_jobs.py

      - name: Save updated state back to the repo
        run: |
          git config user.name "job-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/state.json
          git diff --quiet --cached || git commit -m "Update job-watch state [skip ci]"
          git push
